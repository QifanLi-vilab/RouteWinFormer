# general settings
name: RouteWinFormer-GoPro-width64
model_type: ImageRestorationModel
scale: 1
num_gpu: 4
manual_seed: 10

datasets:
  train:
    name: GoPro-train
    type: PairedImageDataset
    dataroot_gt: /mnt/Data/qfl/Datasets/GoPro_lmdb/train/target.lmdb
    dataroot_lq: /mnt/Data/qfl/Datasets/GoPro_lmdb/train/input.lmdb

    filename_tmpl: '{}'
    io_backend:
      type: lmdb

    gt_size: 256
    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4
    
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: GoPro-val
    type: PairedImageDataset
    dataroot_gt: /mnt/Data/qfl/Datasets/GoPro_lmdb/test/target.lmdb
    dataroot_lq: /mnt/Data/qfl/Datasets/GoPro_lmdb/test/input.lmdb
    io_backend:
      type: lmdb


network_g:
  type: RouteWinFormerLocal
  dim: 64
  img_size: 256
  enc_nums: [2, 4, 6, 8]
  dec_nums: [2, 4, 6, 8]
  num_heads: [1, 2, 4, 8]
# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 300000
    eta_min: !!float 1e-7

  total_iter: 300000
  warmup_iter: -1 # no warm up

  # losses
  pixel_opt:
    type: MultiScaleLoss
    loss_weight: 1.
    blc_weight: 0.01
    reduction: mean
    wedge: false
    
# validation settings
val:
  val_freq: !!float 5e3
  save_img: false
  use_image: false


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
